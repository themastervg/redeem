<script>
const data = [
{game:"Where Winds Meet", code:"LIANGZHOU0402", rewards:"Echo Jade x50", expiry:"2026-06-30"},
{game:"Where Winds Meet", code:"MEETINHEXI", rewards:"Echo Jade + Coins", expiry:"2026-06-30"},
{game:"NTE", code:"NTEHAVEFUN", rewards:"Items", expiry:"2026-05-06"},
{game:"NTE", code:"NTE0429", rewards:"Annulith x100", expiry:"2026-05-13"},
{game:"NTE", code:"NTENANALLYGO", rewards:"Annulith x100", expiry:"2026-05-13"},
{game:"NTE", code:"NTENOWTOENJOY", rewards:"Annulith x100", expiry:"2026-05-13"},
{game:"NTE", code:"NTEGIFT", rewards:"Annulith x50", expiry:"2026-06-30"}
];

let currentFilter = "all";
function render(){
const list=document.getElementById("codes");
list.innerHTML="";
const search=document.getElementById("search").value.toLowerCase();
const today=new Date();

data.forEach(item=>{
const matchSearch =
    item.game.toLowerCase().includes(search) ||
    item.code.toLowerCase().includes(search) ||
    item.rewards.toLowerCase().includes(search);

if(currentFilter!=="all" && item.game!==currentFilter) return;
if(!matchSearch) return;

const expired=new Date(item.expiry)<today;

const div=document.createElement("div");
div.className="card "+(expired?"expired":"");

div.innerHTML=`
<div class="card-left">
<span class="code">${item.code}</span>
<span>${item.rewards}</span>
<span class="expiry">Expires: ${item.expiry}</span>
</div>
<button class="copy-btn" onclick="copyCode('${item.code}')">Copy</button>
`;

list.appendChild(div);
});
}

function copyCode(code) {
    navigator.clipboard.writeText(code);
    const toast = document.getElementById("toast");
    toast.style.display = "block";

    setTimeout(() => {
        toast.style.display = "none";
    }, 1500);
}

function setFilter(game) {
    currentFilter = game;

    document.querySelectorAll(".filter").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");

    render();
}

document.getElementById("search").addEventListener("input", render);
render();

async function loadSubs() {
    try {
        const res = await fetch("https://mixerno.space/api/youtube-channel-counter/user/UC3HIZWxbnOnP9Pe2TKMRc_A");
        const data = await res.json();
        const subs = data?.counts?.[0]?.count;

        document.getElementById("subCount").innerText =
            subs ? subs.toLocaleString() + " subs" : "N/A";

    } catch (e) {
        document.getElementById("subCount").innerText = "N/A";
    }
}

loadSubs();

async function checkLive() {
    try {
        const res = await fetch("https://mixerno.space/api/youtube-channel-counter/user/UC3HIZWxbnOnP9Pe2TKMRc_A");
        const data = await res.json();

        document.getElementById("liveFrame").src =
            "https://www.youtube.com/embed/live_stream?channel=UC3HIZWxbnOnP9Pe2TKMRc_A";

    } catch {
        document.getElementById("liveSection").style.display = "none";
    }
}

checkLive();
</script>
